name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  REGISTRY_NAME: chatbotacrcu
  RESOURCE_GROUP: chatbot_project
  BACKEND_NAME: chatbot-backend
  FRONTEND_NAME: chatbot-frontend
  ADMIN_NAME: chatbot-admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.DEMOAPP_REGISTRY_USERNAME }}
          password: ${{ secrets.DEMOAPP_REGISTRY_PASSWORD }}

      - name: Build and push Backend image
        run: |
          docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.BACKEND_NAME }}:${{ github.sha }} -f azure-deployment/Dockerfile.backend ./backend
          docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.BACKEND_NAME }}:${{ github.sha }}

      - name: Build and push Frontend image
        run: |
          docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.FRONTEND_NAME }}:${{ github.sha }} -f azure-deployment/Dockerfile.frontend ./
          docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.FRONTEND_NAME }}:${{ github.sha }}

      - name: Build and push Admin image
        run: |
          docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.ADMIN_NAME }}:${{ github.sha }} -f azure-deployment/Dockerfile.admin .
          docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.ADMIN_NAME }}:${{ github.sha }}

      - name: Deploy Backend
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.BACKEND_NAME }}:${{ github.sha }} \
            --set-env-vars NODE_ENV=production MONGODB_URI="${{ secrets.MONGODB_URI }}" REDIS_URL="${{ secrets.REDIS_URL }}" JWT_SECRET="${{ secrets.JWT_SECRET }}"

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.FRONTEND_NAME }}:${{ github.sha }} \
            --set-env-vars REACT_APP_API_URL="${{ secrets.FRONTEND_API_URL }}"

      - name: Deploy Admin
        run: |
          az containerapp update \
            --name ${{ env.ADMIN_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.ADMIN_NAME }}:${{ github.sha }} \
            --set-env-vars REACT_APP_API_URL="${{ secrets.FRONTEND_API_URL }}"

      - name: Deployment complete
        run: |
          BACKEND_FQDN=$(az containerapp show --name ${{ env.BACKEND_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query properties.fqdn -o tsv)
          FRONTEND_FQDN=$(az containerapp show --name ${{ env.FRONTEND_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query properties.fqdn -o tsv)
          ADMIN_FQDN=$(az containerapp show --name ${{ env.ADMIN_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query properties.fqdn -o tsv)

          echo "Frontend: https://$FRONTEND_FQDN"
          echo "Admin Panel: https://$ADMIN_FQDN"
          echo "Backend API: https://$BACKEND_FQDN/api"
